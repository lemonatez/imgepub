<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPUB Image Extractor</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <h1>📚 EPUB Image Extractor</h1>

  <div id="dropZone" class="drop-zone">
    <p>Tap or Drag EPUB here</p>
    <input type="file" id="fileInput" accept=".epub" hidden />
  </div>

  <div class="controls">
    <button id="downloadAll" disabled>⬇ Download All</button>
  </div>

  <div id="status" class="status"></div>
  <div id="error" class="error"></div>

  <div id="images" class="grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="script.js"></script>

</body>
</html>
